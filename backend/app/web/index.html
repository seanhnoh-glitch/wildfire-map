<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wildfire Map</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root { --fire:#d85a30; --perim:#b5321f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif; }
  #map { position:absolute; inset:0; }
  .search { position:absolute; top:calc(env(safe-area-inset-top) + 10px); left:10px; right:10px; z-index:5; display:flex; gap:8px; }
  .search input { flex:1; border:0; border-radius:12px; padding:13px 14px; font-size:16px;
    box-shadow:0 2px 10px rgba(0,0,0,.18); }
  .search button { border:0; border-radius:12px; background:#fff; width:48px; font-size:20px;
    color:var(--fire); box-shadow:0 2px 10px rgba(0,0,0,.18); }
  .toast { position:absolute; top:calc(env(safe-area-inset-top) + 66px); left:10px; right:10px; z-index:5;
    background:#1c1c1a; color:#fff; font-size:13px; padding:9px 12px; border-radius:10px; opacity:0;
    transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:.92; }
  .sheet { position:absolute; left:0; right:0; bottom:0; z-index:6; background:#fff;
    border-radius:20px 20px 0 0; padding:16px 18px calc(env(safe-area-inset-bottom) + 20px);
    box-shadow:0 -3px 20px rgba(0,0,0,.2); transform:translateY(110%); transition:transform .25s; }
  .sheet.show { transform:translateY(0); }
  /* Tap the grip to minimize the sheet so the full map/routes are visible. */
  .sheet.show.min { transform:translateY(calc(100% - 46px)); }
  .grip { width:46px; height:5px; background:#c4c4c4; border-radius:3px; margin:0 auto 12px;
    cursor:pointer; position:relative; }
  .grip::before { content:""; position:absolute; inset:-14px -60px; }   /* enlarge tap target */
  .sheet h2 { margin:0 0 4px; font-size:18px; }
  .meta { color:#333; font-size:14px; } .sub { color:#888; font-size:12px; margin-top:2px; }
  .x { position:absolute; top:14px; right:16px; font-size:18px; color:#aaa; }
  .btn { margin-top:14px; width:100%; border:0; border-radius:12px; background:var(--fire); color:#fff;
    font-size:16px; font-weight:600; padding:13px; }
  .btn[disabled] { opacity:.6; }
  .fc { margin-top:14px; }
  .fc .lab { font-size:12px; color:#666; }
  .fc input[type=range] { width:100%; margin-top:10px; accent-color:var(--fire); }
  .hourrow { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
  .hourrow b { font-size:20px; } .disc { font-size:11px; color:#999; margin-top:10px; }
  .legend { position:absolute; left:10px; bottom:10px; z-index:4; background:rgba(255,255,255,.9);
    border-radius:10px; padding:8px 10px; font-size:11px; box-shadow:0 2px 8px rgba(0,0,0,.15); display:none; }
  .legend.show { display:block; } .legend i { display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px; vertical-align:-2px; }
  .btn.evac { background:#1f7a4d; }
  .routes { margin-top:12px; }
  .route { display:flex; align-items:center; gap:10px; padding:10px 11px; border-radius:12px;
    border:1px solid #eee; margin-top:8px; }
  .route.warn { border-color:#e0a020; background:#fdf6e8; }
  .route.selected { border-color:#1f7a4d; box-shadow:0 0 0 2px #1f7a4d; }
  .route .swatch { width:11px; height:11px; border-radius:50%; flex:none; }
  .route .rtxt { flex:1; font-size:13px; line-height:1.3; }
  .route .rtxt b { font-size:14px; } .route .rtxt small { color:#888; display:block; }
  .badge { display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:8px;
    margin-left:6px; vertical-align:1px; }
  .badge.official { background:#e3f4ea; color:#1a7a49; }
  .badge.backup { background:#eee; color:#777; }
  .route .reta { text-align:right; } .route .reta b { font-size:16px; } .route .reta small { color:#c0392b; display:block; font-size:11px; }
  .evacnote { font-size:12px; color:#8a6d00; margin-top:8px; }
  .evacfab { position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom) + 26px); z-index:5; border:0; border-radius:24px;
    background:#1f7a4d; color:#fff; font-size:15px; font-weight:600; padding:13px 20px;
    box-shadow:0 4px 14px rgba(0,0,0,.28); }
  .evacfab:active { background:#1a6640; }
</style>
</head>
<body>
<div id="map"></div>

<div class="search">
  <input id="addr" type="text" inputmode="search" enterkeyhint="search"
         placeholder="Enter a US address or city" autocapitalize="words" autocomplete="off">
  <button id="locate" title="Use my location">◎</button>
</div>
<div id="toast" class="toast"></div>

<!-- Location-first evacuation: appears once we know where you are and a fire is
     nearby. Routes you away from the nearest fire — no need to pick one first. -->
<button id="evacFab" class="evacfab" style="display:none">Plan evacuation route</button>

<div class="legend" id="legend">
  <div><i style="background:#ffd88f"></i>+1h &nbsp; <i style="background:#f5a24a"></i>+12h &nbsp; <i style="background:#ec7048"></i>+24h</div>
  <div style="margin-top:4px"><i style="background:#b5321f;opacity:.35"></i>current fire footprint</div>
  <div style="margin-top:4px">
    <i style="background:#ffe66a;margin-right:1px"></i><i style="background:#ffb020;margin-right:1px"></i><i style="background:#ff7a00;margin-right:1px"></i><i style="background:#f23018;margin-right:1px"></i><i style="background:#a10000"></i>
    fire intensity (low → extreme, zoom in)
  </div>
</div>

<div id="sheet" class="sheet">
  <div class="grip"></div>
  <span class="x" id="closeSheet">✕</span>
  <h2 id="fName">Fire</h2>
  <div class="meta" id="fMeta"></div>
  <div class="sub" id="fSub"></div>
  <button class="btn" id="predictBtn">Forecast spread →</button>
  <div class="fc" id="fc" style="display:none">
    <div class="lab" id="fcInfo"></div>
    <div class="hourrow"><span class="lab">Forecast horizon</span><b id="hourLabel">+24h</b></div>
    <input id="hour" type="range" min="1" max="24" step="1" value="24">
    <div class="disc">Research estimate — wind-, fuel-, and terrain-driven ForeFire simulation. Not operational guidance.</div>
  </div>
  <button class="btn evac" id="evacBtn" style="display:none">Plan evacuation route</button>
</div>

<!-- Evacuation results (own sheet, so it works with or without a fire selected). -->
<div id="evacSheet" class="sheet">
  <div class="grip"></div>
  <span class="x" id="closeEvac">✕</span>
  <h2 id="evacTitle">Evacuation route</h2>
  <div class="sub" id="evacSub"></div>
  <div class="routes" id="routes"></div>
</div>

<script>
// Served from the backend, so the API is same-origin — no config, no CORS.
const API = window.location.origin;

// Keyless satellite imagery base map (dev/prototype use) so actual vegetation —
// forest canopy vs. dry grass/scrub vs. bare ground — is directly visible, with a
// transparent reference overlay for roads and place names.
const STYLE = {
  version: 8,
  sources: {
    imagery: { type:"raster", tileSize:256,
      tiles:["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
      attribution:"Imagery © Esri, Maxar, Earthstar Geographics" },
    labels: { type:"raster", tileSize:256,
      tiles:["https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}"],
      attribution:"© Esri" }
  },
  layers: [
    { id:"imagery", type:"raster", source:"imagery" },
    { id:"labels", type:"raster", source:"labels" }
  ]
};

const map = new maplibregl.Map({ container:"map", style:STYLE, center:[-119.4,37.5], zoom:5.2 });
map.addControl(new maplibregl.NavigationControl({ showCompass:false }), "bottom-right");

// How many hours ahead to forecast (schema allows up to 48; the hourly wind
// forecast supports up to 48h). Change this one value to adjust the horizon.
const FORECAST_HOURS = 24;

let fires = [], selected = null, prediction = null, origin = null, animTimer = null;
let watchId = null, routeOrigin = null, rerouting = false;   // live-location tracking state
let originMode = null;   // 'search' (typed address, pinned) | 'gps' (follows live location)
function haversineKm(la1, lo1, la2, lo2){ const R=6371, r=Math.PI/180;
  const dLa=(la2-la1)*r, dLo=(lo2-lo1)*r;
  const s=Math.sin(dLa/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(s)); }

function toast(msg, ms=2600){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); if(ms) t._t=setTimeout(()=>t.classList.remove("show"), ms); }
function hideToast(){ document.getElementById("toast").classList.remove("show"); }

async function jget(path){ const r=await fetch(API+path); if(!r.ok) throw new Error((await r.text()).slice(0,140)); return r.json(); }
async function jpost(path, body){ const r=await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify(body)}); if(!r.ok) throw new Error((await r.text()).slice(0,140)); return r.json(); }

function setSource(id, data, layers){
  if (map.getSource(id)) { map.getSource(id).setData(data); return; }
  map.addSource(id, { type:"geojson", data });
  layers.forEach(l => { if(!map.getLayer(l.id)) map.addLayer(l); });
}

// --- Place fire dots at the perimeter CENTER (not the incident point, which is
// the point of origin and can sit at the edge of / outside the perimeter). We
// match incidents to perimeters by name and use the area-centroid of the largest
// ring. Fires without a mapped perimeter keep their incident point.
let perimCenter = {};   // normalized incident name -> [lon,lat]
let perimBounds = {};   // normalized incident name -> [[minLon,minLat],[maxLon,maxLat]]
function normName(s){ return (s||"").trim().toUpperCase().replace(/\s+/g," "); }
function ringBounds(r){
  let m=[Infinity,Infinity], M=[-Infinity,-Infinity];
  r.forEach(([x,y])=>{ if(x<m[0])m[0]=x; if(y<m[1])m[1]=y; if(x>M[0])M[0]=x; if(y>M[1])M[1]=y; });
  return [m, M];
}
// A lon/lat box around a point sized to a fire's acreage (fallback when we have
// no mapped perimeter): radius from area, padded so the fire fills ~half the view.
function boundsForAcres(lon, lat, acres){
  const r = Math.sqrt(Math.max(acres||100, 50) * 4046.86 / Math.PI) * 1.9;  // metres
  const dLat = r/111000, dLon = r/(111000*Math.cos(lat*Math.PI/180));
  return [[lon-dLon, lat-dLat],[lon+dLon, lat+dLat]];
}
// Grow a [[minLon,minLat],[maxLon,maxLat]] box around its centre by `factor`,
// leaving room for the forecast to spread beyond the current perimeter.
function expandBounds(box, factor){
  const [m,M]=box, cx=(m[0]+M[0])/2, cy=(m[1]+M[1])/2;
  const hx=(M[0]-m[0])/2*factor, hy=(M[1]-m[1])/2*factor;
  return [[cx-hx, cy-hy],[cx+hx, cy+hy]];
}
function ringArea(r){ let a=0; for(let i=0;i<r.length-1;i++){ a+=r[i][0]*r[i+1][1]-r[i+1][0]*r[i][1]; } return Math.abs(a)/2; }
function largestRing(geom){
  if(!geom) return null;
  if(geom.type==="Polygon") return geom.coordinates[0];
  if(geom.type==="MultiPolygon"){ let best=null,ba=-1; for(const p of (geom.coordinates||[])){ const r=p[0]; if(!r) continue; const a=ringArea(r); if(a>ba){ ba=a; best=r; } } return best; }
  return null;
}
function ringCentroid(r){   // area centroid via the shoelace formula
  let a=0,cx=0,cy=0;
  for(let i=0;i<r.length-1;i++){ const [x0,y0]=r[i],[x1,y1]=r[i+1]; const cr=x0*y1-x1*y0; a+=cr; cx+=(x0+x1)*cr; cy+=(y0+y1)*cr; }
  a*=0.5;
  if(Math.abs(a)<1e-12){ let sx=0,sy=0; r.forEach(([x,y])=>{sx+=x;sy+=y;}); return [sx/r.length, sy/r.length]; }
  return [cx/(6*a), cy/(6*a)];
}
function buildPerimCenters(fc){
  perimCenter = {}; perimBounds = {};
  (fc && fc.features || []).forEach(f=>{
    const nm = normName(f.properties && f.properties.poly_IncidentName);
    if(!nm) return;
    const ring = largestRing(f.geometry);
    if(ring && ring.length>=4){ perimCenter[nm] = ringCentroid(ring); perimBounds[nm] = ringBounds(ring); }
  });
}
function applyPerimCenters(){   // move matched fires to their perimeter center, then redraw
  let moved=0;
  fires.forEach(f=>{ const c=perimCenter[normName(f.name)]; if(c){ f.lon=c[0]; f.lat=c[1]; moved++; } });
  drawFirePoints();
  return moved;
}

function drawFirePoints(){
  const pts = { type:"FeatureCollection", features: fires.map(f => ({
    type:"Feature", properties:{ id:f.id, name:f.name }, geometry:{ type:"Point", coordinates:[f.lon,f.lat] } })) };
  setSource("fires", pts, [
    { id:"fires-dot", type:"circle", source:"fires",
      paint:{ "circle-radius":6,"circle-color":"#d85a30","circle-stroke-color":"#fff","circle-stroke-width":1.5 } },
  ]);
}

// Load EVERY ongoing US wildfire and show them all on the map (largest first).
// Pass quiet=true for background auto-refresh (no toasts).
async function loadAllFires(quiet){
  if(!quiet) toast("Loading active wildfires…", 0);
  try {
    fires = await jget("/fires/all?min_acres=50&limit=2000");
    applyPerimCenters();   // reposition onto perimeter centers if perimeters are loaded
    updateEvacFab();       // a location set before fires loaded may now have a nearby fire
    if(!quiet) toast(fires.length + " active wildfires nationwide — tap any dot, or search your area.");
  } catch(e){ if(!quiet) toast("Couldn't load fires: "+e.message); }
}

// Perimeters use "detail on demand": a fast, simplified nationwide base when
// zoomed out, swapped for full-resolution viewport perimeters when zoomed in.
let nationalPerims = null;
const PERIM_ZOOM = 7.5;   // at/above this zoom, fetch crisp viewport perimeters

function setPerimeters(fc){
  setSource("perimeters", fc || {type:"FeatureCollection",features:[]}, [
    { id:"perim-fill", type:"fill", source:"perimeters", paint:{ "fill-color":"#b5321f","fill-opacity":0.25 } },
    { id:"perim-line", type:"line", source:"perimeters", paint:{ "line-color":"#8f2417","line-width":1.5 } },
  ]);
  if (map.getLayer("fires-dot")) map.moveLayer("fires-dot"); // keep dots on top
}

// Draw ALL current fire perimeters nationwide up front (no click needed).
async function loadAllPerimeters(){
  try {
    nationalPerims = await jget("/perimeters/all?min_acres=100");
    setPerimeters(nationalPerims);
    buildPerimCenters(nationalPerims);
    if(fires.length) applyPerimCenters();   // reposition dots now that centers are known
  } catch(e){ /* best-effort overlay */ }
}

// On pan/zoom: crisp viewport perimeters when zoomed in, national base when out.
async function refreshPerimeters(){
  if (map.getZoom() < PERIM_ZOOM){
    if (nationalPerims && map.getSource("perimeters")) map.getSource("perimeters").setData(nationalPerims);
    return;
  }
  const b = map.getBounds();
  const w=b.getWest(), s=b.getSouth(), e=b.getEast(), n=b.getNorth();
  // Simplify by ~1 pixel so detail matches the screen while payloads stay small.
  const offset = Math.max(0, (e - w) / Math.max(1, map.getCanvas().clientWidth) * 1.2);
  try {
    const fc = await jget(`/perimeters/bbox?west=${w}&south=${s}&east=${e}&north=${n}&min_acres=10&offset=${offset}`);
    if (map.getSource("perimeters")) map.getSource("perimeters").setData(fc);
    if (map.getLayer("fires-dot")) map.moveLayer("fires-dot");
  } catch(err){ /* keep whatever is currently shown */ }
}

// NASA FIRMS satellite hotspots (where fire is actively burning right now).
// Only fetched when zoomed in — nationwide would be huge and hit FIRMS rate
// limits. Empty overlay when zoomed out or if no FIRMS key is configured.
async function refreshHotspots(){
  const empty = { type:"FeatureCollection", features:[] };
  if (map.getZoom() < PERIM_ZOOM){
    if (map.getSource("hotspots")) map.getSource("hotspots").setData(empty);
    return;
  }
  const b = map.getBounds();
  const w=b.getWest(), s=b.getSouth(), e=b.getEast(), n=b.getNorth();
  try {
    const fc = await jget(`/hotspots/bbox?west=${w}&south=${s}&east=${e}&north=${n}`);
    setSource("hotspots", fc, [
      // Size + heat-colour each detection by Fire Radiative Power (FRP, MW) — a
      // direct proxy for how intensely that pixel is burning — so the hottest,
      // most active parts of the fire stand out from the smouldering edges.
      { id:"hotspots-dot", type:"circle", source:"hotspots", paint:{
          "circle-radius":[
            "interpolate", ["linear"], ["to-number", ["get","frp"], 0],
            0, 5,  20, 7.5,  75, 10,  200, 14,  500, 18 ],
          "circle-color":[
            "interpolate", ["linear"], ["to-number", ["get","frp"], 0],
            0, "#ffd23f",  20, "#ff9500",  60, "#ff6a00",  150, "#ef2b12",  400, "#9e0000" ],
          "circle-opacity":0.92,
          "circle-stroke-color":"#2a0700", "circle-stroke-width":1 } },
    ]);
    if (map.getLayer("fires-dot")) map.moveLayer("fires-dot"); // keep dots on top
  } catch(err){ /* best-effort overlay */ }
}

function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

// Frame a location together with the local cluster of nearby fires so the dots
// are actually visible, and report how many are nearby. Used by search + GPS.
// Concern thresholds (km). Grounded in wildfire behavior, not smoke range:
//  - IMMEDIATE: a fast wind-driven fire + ember spotting can plausibly reach
//    you within a day at this distance -> act now.
//  - ALERT: outer bound of realistic personal concern (~40 mi monitoring band).
const THREAT_IMMEDIATE_KM = 25;
const THREAT_ALERT_KM = 65;

function frameNearbyFires(lat, lon){
  showMe(lat, lon);              // drop a marker so you can see exactly where your location is
  const RAD = THREAT_ALERT_KM;   // km considered "nearby / stay alert"
  const near = fires
    .map(f => ({ f, d: haversineKm(lat, lon, f.lat, f.lon) }))
    .filter(o => o.d <= RAD)
    .sort((a,b) => a.d - b.d);
  if (near.length){
    // Include fires within ~2.2x the nearest (the local cluster), so one distant
    // fire doesn't zoom the whole view out.
    const localR = Math.min(RAD, Math.max(near[0].d * 2.2, 30));
    const pts = [[lon, lat], ...near.filter(o => o.d <= localR).slice(0,12).map(o => [o.f.lon, o.f.lat])];
    let m=[Infinity,Infinity], M=[-Infinity,-Infinity];
    pts.forEach(([x,y])=>{ if(x<m[0])m[0]=x; if(y<m[1])m[1]=y; if(x>M[0])M[0]=x; if(y>M[1])M[1]=y; });
    map.fitBounds([m,M], { padding: 70, maxZoom: 11, duration: 900 });
    const n = near.length;
    const imminent = near.filter(o => o.d <= THREAT_IMMEDIATE_KM).length;
    if (imminent){
      toast(`⚠️ ${imminent} wildfire${imminent>1?'s':''} within ${THREAT_IMMEDIATE_KM} km — nearest ${near[0].d.toFixed(0)} km. Tap “Plan evacuation route”.`);
    } else {
      toast(`${n} active wildfire${n>1?'s':''} within ${RAD} km — nearest ${near[0].d.toFixed(0)} km. Tap “Plan evacuation route”, or a dot to forecast.`);
    }
  } else {
    map.flyTo({ center:[lon,lat], zoom:8 });
    toast(`No active wildfires within ${RAD} km — showing your area.`);
  }
  updateEvacFab();
}

async function search(){
  const v = document.getElementById("addr").value.trim(); if(!v) return;
  toast("Finding address…", 0);
  try {
    const g = await jget(`/geocode?address=${encodeURIComponent(v)}`);
    origin = { lat:g.lat, lon:g.lon };
    originMode = "search";        // a typed address pins the origin; live GPS won't override it
    // Stop live-follow so GPS can't move the origin off the address you chose.
    if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null;
      const lb=document.getElementById("locate"); lb.style.color=""; lb.textContent="◎"; }
    showMe(g.lat, g.lon);         // drop a location pin at the searched place
    frameNearbyFires(g.lat, g.lon);
  } catch(e){ toast("Address not found. Try 'City, ST'."); }
}

// Nearest active fire to a point, within maxKm (null if none). Used to offer an
// evacuation route straight from a location, without picking a fire first.
function nearestFire(lat, lon, maxKm){
  let best=null, bestD=Infinity;
  for(const f of fires){ const d=haversineKm(lat, lon, f.lat, f.lon);
    if(d<=maxKm && d<bestD){ bestD=d; best=f; } }
  return best;
}
// Show the location-first evacuation button when we have a location AND a fire is
// near enough to matter — and no sheet is already covering the bottom.
function updateEvacFab(){
  const fab=document.getElementById("evacFab");
  const show = origin && nearestFire(origin.lat, origin.lon, THREAT_ALERT_KM)
               && !sheet.classList.contains("show") && !evacSheet.classList.contains("show");
  fab.style.display = show ? "block" : "none";
}

// --- Fire selection + forecast ---
const sheet = document.getElementById("sheet");
const evacSheet = document.getElementById("evacSheet");
function openSheet(f){
  selected = f; prediction = null;
  clearInterval(animTimer); animTimer = null;
  ["iso-fill","iso-line"].forEach(id=>{ if(map.getLayer(id)) map.setLayoutProperty(id,"visibility","none"); });
  document.getElementById("legend").classList.remove("show");
  document.getElementById("fName").textContent = f.name;
  const parts = [];
  if (origin) parts.push(`${haversineKm(origin.lat, origin.lon, f.lat, f.lon).toFixed(1)} km away`);
  if (f.size_acres != null) parts.push(`${Number(f.size_acres).toLocaleString()} acres`);
  if (f.percent_contained != null) parts.push(`${f.percent_contained}% contained`);
  document.getElementById("fMeta").textContent = parts.join(" · ");
  document.getElementById("fSub").textContent = [f.county, f.state].filter(Boolean).join(", ");
  document.getElementById("fc").style.display = "none";
  // A 100%-contained fire has a complete control line and won't spread outward,
  // so a free-spread forecast is meaningless — disable it.
  const btn = document.getElementById("predictBtn");
  btn.style.display = "block";
  if (f.percent_contained != null && f.percent_contained >= 100){
    btn.disabled = true;
    btn.textContent = "🛡️ 100% contained — no spread expected";
  } else {
    btn.disabled = false;
    btn.textContent = "Forecast spread →";
  }
  // The per-fire evacuate button is hidden until a forecast is run — only then
  // does it do something the main "Plan evacuation route" button doesn't: route
  // around the PREDICTED spread, not just the current footprint.
  const evac = document.getElementById("evacBtn");
  evac.style.display = "none";
  evac.disabled = false; evac.textContent = "Plan evacuation route";
  closeEvacSheet();
  sheet.classList.remove("min");
  sheet.classList.add("show");
  updateEvacFab();
  // Zoom to FIT the fire, not a fixed level: real perimeter bounds if we have
  // them, else a box from the acreage. Expanded ~1.8x so the forecast has room to
  // spread beyond the current perimeter without running off-screen.
  const pb = perimBounds[normName(f.name)];
  let box = pb || (f.size_acres != null ? boundsForAcres(f.lon, f.lat, f.size_acres) : null);
  if (box) map.fitBounds(expandBounds(box, 1.8), { padding: 50, maxZoom: 12, duration: 800 });
  else map.flyTo({ center:[f.lon,f.lat], zoom:10 });
}
function closeSheet(){ sheet.classList.remove("show"); selected=null;
  clearInterval(animTimer); animTimer=null;
  document.getElementById("legend").classList.remove("show");
  ["iso-fill","iso-line"].forEach(id=>{ if(map.getLayer(id)) map.setLayoutProperty(id,"visibility","none"); });
  updateEvacFab(); }

document.getElementById("closeSheet").onclick = closeSheet;

async function runForecast(){
  if(!selected) return;
  const btn = document.getElementById("predictBtn"); btn.disabled = true; btn.textContent = "Forecasting…";
  try {
    prediction = await jpost("/predict", { lat:selected.lat, lon:selected.lon, duration_hours:FORECAST_HOURS, step_minutes:60,
      percent_contained:selected.percent_contained });
    // Fully-contained fires return no forecast (empty isochrones) with a note.
    if (prediction.contained || !(prediction.isochrones.features||[]).length){
      document.getElementById("fcInfo").textContent = (prediction.notes && prediction.notes[0])
        || "No spread forecast: this fire is reported fully contained.";
      document.getElementById("fc").style.display = "block";
      btn.disabled = true; btn.textContent = "🛡️ No spread expected";
      return;
    }
    const feats = prediction.isochrones.features;
    const maxH = Math.max(...feats.map(f=>f.properties.hours));
    // Time gradient: light (soon) → deep red (full horizon). Stops must ascend,
    // so drop the mid stop when the horizon is tiny (partial forecast).
    const fillColor = maxH >= 3
      ? ["interpolate",["linear"],["get","hours"], 1,"#ffd88f", maxH/2,"#f5a24a", maxH,"#ec7048"]
      : ["interpolate",["linear"],["get","hours"], 1,"#ffd88f", Math.max(1.5,maxH),"#ec7048"];
    setSource("iso", prediction.isochrones, [
      { id:"iso-fill", type:"fill", source:"iso", paint:{
          "fill-color":fillColor, "fill-opacity":0.18 } },
      { id:"iso-line", type:"line", source:"iso", paint:{ "line-color":"#e8613a","line-width":1,"line-opacity":0.5 } },
    ]);
    // Keep fire dots above the fill.
    if(map.getLayer("fires-dot")) map.moveLayer("fires-dot");
    ["iso-fill","iso-line"].forEach(id=> map.setLayoutProperty(id,"visibility","visible"));
    const p = prediction.parameters;
    document.getElementById("fcInfo").textContent =
      `engine: ${prediction.engine} · ignition: ${p.ignition} · fuel ${p.fuel_model} · ` +
      `wind ${Math.round(p.wind_speed_kmh)}→${Math.round(p.wind_end_speed_kmh)} km/h`;
    const hour = document.getElementById("hour"); hour.max = String(maxH); hour.value = String(maxH);
    document.getElementById("fc").style.display = "block";
    document.getElementById("predictBtn").style.display = "none";
    // Now that we have a predicted spread, offer the spread-aware evacuation —
    // but only if this fire is actually near your location (within the alert
    // radius). A distant fire is not something you'd evacuate from here.
    if(origin && haversineKm(origin.lat, origin.lon, selected.lat, selected.lon) <= THREAT_ALERT_KM)
      document.getElementById("evacBtn").style.display = "block";
    document.getElementById("legend").classList.add("show");
    animateForecast(maxH);   // sweep from 0h up to the full horizon
  } catch(e){ toast("Forecast failed: "+e.message); btn.disabled=false; btn.textContent="Forecast spread →"; }
}
function applyHour(h){
  document.getElementById("hourLabel").textContent = "+"+h+"h";
  const f = ["<=", ["get","hours"], h + 0.001];
  if(map.getLayer("iso-fill")) map.setFilter("iso-fill", f);
  if(map.getLayer("iso-line")) map.setFilter("iso-line", f);
}
// Animate the spread reveal, LOOPING: 0h (empty) -> grow to maxH -> brief hold -> repeat.
function animateForecast(maxH){
  clearInterval(animTimer);
  const cycle = maxH + 2;                 // frame 0 empty, 1..maxH grow, +1 hold at full
  let f = 0;
  const tick = ()=>{
    const h = Math.min(f, maxH);
    applyHour(h);
    document.getElementById("hour").value = String(Math.max(1, h));
    f = (f + 1) % cycle;
  };
  tick();
  // Pace so the full sweep takes ~10s regardless of horizon (faster per-frame
  // for a 24h forecast, slower for a short one), bounded to a comfortable range.
  const ms = Math.min(650, Math.max(250, Math.round(10000 / cycle)));
  animTimer = setInterval(tick, ms);
}

document.getElementById("predictBtn").onclick = runForecast;

// --- Evacuation routing ------------------------------------------------------
const ROUTE_COLORS = ["#1f7a4d", "#2b6cb0", "#7a4fbf"];   // distinct colors per route
let selectedRouteIdx = -1;   // which route the user has clicked (-1 = none)

// Classify a destination: an OFFICIAL government / Red Cross designated evacuation
// place people are meant to go, vs a BACKUP location used when none is available.
function destBadge(dest){
  if(dest.source === "FEMA") return { cls:"official", text:"Official shelter · open" };
  if(dest.category === "shelter") return { cls:"official", text:"Designated assembly point" };
  return { cls:"backup", text:"Backup location" };
}

// Highlight one route (list item + its map line), on click. Switches on re-click.
function selectRoute(i, routes){
  selectedRouteIdx = i;
  document.querySelectorAll("#routes .route").forEach((el,j)=> el.classList.toggle("selected", j===i));
  if(map.getLayer("evac-line")){
    map.setPaintProperty("evac-line","line-width",["case",["==",["get","idx"], i], 7, 3]);
    map.setPaintProperty("evac-line","line-opacity",["case",["==",["get","idx"], i], 1, 0.45]);
  }
  const b=lineBounds(routes[i].geometry); if(b) map.fitBounds(b,{padding:60,duration:600});
}

function clearEvac(){
  // Leaves the "you" dot in place — it marks your location, not a route.
  ["evac-line","evac-dest"].forEach(id=>{ if(map.getLayer(id)) map.removeLayer(id); });
  ["evac-lines","evac-dests"].forEach(id=>{ if(map.getSource(id)) map.removeSource(id); });
  const box=document.getElementById("routes"); box.style.display="none"; box.innerHTML="";
}
function fmtMin(m){ if(m==null) return "—"; if(m<60) return Math.round(m)+" min";
  const h=Math.floor(m/60); return h+"h "+Math.round(m-h*60)+"m"; }

// Open the evacuation results sheet. Slides the fire sheet down (but leaves any
// forecast overlay on the map) so routes and spread can be seen together.
function openEvacSheet(fire){
  sheet.classList.remove("show");
  const dist = origin ? Math.round(haversineKm(origin.lat, origin.lon, fire.lat, fire.lon)) : null;
  document.getElementById("evacSub").textContent =
    "Routes away from " + fire.name + (dist!=null ? ` — ${dist} km from you` : "");
  evacSheet.classList.remove("min");
  evacSheet.classList.add("show");
  updateEvacFab();
}
function closeEvacSheet(){
  evacSheet.classList.remove("show");
  clearEvac();
  updateEvacFab();
}

async function planEvacuation(opts){
  opts = opts || {};
  if(!origin){ toast("Set your location first — search a place or tap ◎."); return; }
  // Route away from the chosen fire, the open fire, or just the nearest one.
  const target = opts.fire || selected || nearestFire(origin.lat, origin.lon, THREAT_ALERT_KM);
  if(!target){ toast("No active wildfire near you to evacuate from."); return; }
  // Only offer evacuation when the fire is close enough to your location to matter.
  if(haversineKm(origin.lat, origin.lon, target.lat, target.lon) > THREAT_ALERT_KM){
    if(!opts.auto) toast(`That fire is over ${THREAT_ALERT_KM} km from your location — no evacuation needed from here.`);
    return;
  }
  if(opts.auto){ if(rerouting) return; rerouting = true; }          // avoid overlapping re-plans
  const fab=document.getElementById("evacFab");
  if(!opts.auto){ fab.disabled=true; fab.textContent="Finding safe routes…"; toast("Finding safe routes…", 0); }
  try{
    const body={ lat:origin.lat, lon:origin.lon, fire_lat:target.lat, fire_lon:target.lon, max_routes:3 };
    // If a forecast was run for THIS fire, avoid where it's GOING, not just where it is.
    if(target===selected && prediction && prediction.isochrones) body.avoid_geojson=prediction.isochrones;
    const res = await jpost("/evacuation", body);
    routeOrigin = { lat:origin.lat, lon:origin.lon };               // where these routes start from
    if(!opts.auto){ openEvacSheet(target); hideToast(); }
    renderRoutes(res, { refit: !opts.auto });                       // don't yank the view on auto re-plan
  }catch(e){ if(!opts.auto) toast("Evacuation planning failed: "+e.message); }
  finally{
    if(opts.auto) rerouting = false;
    else { fab.disabled=false; fab.textContent="Plan evacuation route"; }
  }
}

function renderRoutes(res, opts){
  opts = opts || {};
  clearEvac();
  const box=document.getElementById("routes"); box.style.display="block";
  const routes=res.routes||[];
  const shownDests = routes.length ? routes.map(r=>r.destination) : (res.destinations||[]);
  selectedRouteIdx = -1;   // nothing highlighted until the user picks a route
  const lineFC={ type:"FeatureCollection", features: routes.map((r,i)=>({
      type:"Feature",
      properties:{ idx:i, color: r.passes_near_fire ? "#e0a020" : ROUTE_COLORS[i%ROUTE_COLORS.length] },
      geometry: r.geometry })) };
  const destFC={ type:"FeatureCollection", features: shownDests.map(d=>({
      type:"Feature", properties:{ shelter: d.category==="shelter" },
      geometry:{ type:"Point", coordinates:[d.lon,d.lat] } })) };
  if(routes.length){
    map.addSource("evac-lines",{type:"geojson",data:lineFC});
    map.addLayer({ id:"evac-line", type:"line", source:"evac-lines",
      layout:{"line-cap":"round","line-join":"round"},
      paint:{ "line-color":["get","color"], "line-width":4, "line-opacity":0.85 } });
  }
  map.addSource("evac-dests",{type:"geojson",data:destFC});
  // Safe places are green (shelters a deeper green, backup areas a lighter green).
  map.addLayer({ id:"evac-dest", type:"circle", source:"evac-dests",
    paint:{ "circle-radius":7, "circle-color":["case",["get","shelter"],"#1f7a4d","#34a853"],
      "circle-stroke-width":2, "circle-stroke-color":"#fff" } });
  showMe(origin.lat, origin.lon);   // make sure your location is marked (the routes start here)
  if(map.getLayer("fires-dot")) map.moveLayer("fires-dot");

  box.innerHTML="";
  if(!routes.length){
    box.innerHTML = `<div class="evacnote">No drive routes${res.notes&&res.notes.length? " — "+res.notes[0]:""}. Safe areas are marked on the map.</div>`;
  }
  routes.forEach((r,i)=>{
    const color = r.passes_near_fire ? "#e0a020" : ROUTE_COLORS[i%ROUTE_COLORS.length];
    const delay = (r.duration_typical_min!=null && r.duration_min - r.duration_typical_min > 3)
      ? `+${Math.round(r.duration_min - r.duration_typical_min)} min traffic` : "";
    const tag = r.recommended ? "Recommended" : (r.passes_near_fire ? "⚠️ passes near fire" : "alternate");
    const dest=r.destination;
    const badge = destBadge(dest);   // official designated shelter vs backup location
    const el=document.createElement("div"); el.className = r.passes_near_fire ? "route warn" : "route";
    el.innerHTML =
      `<span class="swatch" style="background:${color}"></span>`+
      `<div class="rtxt"><b>${dest.name}</b><span class="badge ${badge.cls}">${badge.text}</span>`+
        `<small>${tag} · ${r.distance_km} km${dest.detail? " · "+dest.detail:""}</small></div>`+
      `<div class="reta"><b>${fmtMin(r.duration_min)}</b>${delay?`<small>${delay}</small>`:""}</div>`;
    el.onclick = ()=> selectRoute(i, routes);
    box.appendChild(el);
  });
  (res.notes||[]).forEach(n=>{ if(!routes.length && res.notes[0]===n) return;
    const d=document.createElement("div"); d.className="evacnote"; d.textContent=n; box.appendChild(d); });

  if(opts.refit !== false){
    const b=fitEvacBounds(routes, shownDests);
    if(b) map.fitBounds(b,{ padding:{top:80,bottom:evacSheet.offsetHeight+20,left:40,right:40}, maxZoom:13, duration:800 });
  }
}

function lineBounds(geom){
  if(!geom||!geom.coordinates) return null;
  let m=[Infinity,Infinity],M=[-Infinity,-Infinity];
  geom.coordinates.forEach(([x,y])=>{ if(x<m[0])m[0]=x; if(y<m[1])m[1]=y; if(x>M[0])M[0]=x; if(y>M[1])M[1]=y; });
  return isFinite(m[0])?[m,M]:null;
}
function fitEvacBounds(routes, dests){
  let m=[Infinity,Infinity],M=[-Infinity,-Infinity], any=false;
  const add=(x,y)=>{ any=true; if(x<m[0])m[0]=x; if(y<m[1])m[1]=y; if(x>M[0])M[0]=x; if(y>M[1])M[1]=y; };
  if(origin) add(origin.lon,origin.lat);
  routes.forEach(r=> (r.geometry.coordinates||[]).forEach(([x,y])=>add(x,y)));
  dests.forEach(d=> add(d.lon,d.lat));
  return any?[m,M]:null;
}
document.getElementById("evacBtn").onclick = ()=> planEvacuation();          // from a fire's sheet
document.getElementById("evacFab").onclick = ()=> planEvacuation();          // location-first (nearest fire)
document.getElementById("closeEvac").onclick = closeEvacSheet;
// Tap a sheet's grip handle to minimize it (reveal the full map) / restore it.
document.querySelectorAll(".sheet .grip").forEach(g=>{
  g.onclick = ()=> g.closest(".sheet").classList.toggle("min");
});

// Dragging the slider takes over from the animation.
document.getElementById("hour").oninput = (e)=>{ clearInterval(animTimer); animTimer=null; applyHour(Number(e.target.value)); };
document.getElementById("addr").addEventListener("keydown", e=>{ if(e.key==="Enter") search(); });

// Show all ongoing fires + all perimeters as soon as the map is ready.
map.on("load", ()=>{ loadAllPerimeters(); loadAllFires(); });
// Swap to crisp viewport perimeters + satellite hotspots when zoomed in.
map.on("moveend", debounce(()=>{ refreshPerimeters(); refreshHotspots(); }, 350));

// Auto-refresh so newly reported fires/perimeters/hotspots appear without a page
// reload. Quiet (no toasts); re-fetches national fire + perimeter data every
// 5 min, plus crisp viewport perimeters and hotspots when zoomed in. Skips
// refreshing the dots while a fire's forecast sheet is open (won't disrupt it).
const REFRESH_MS = 5*60*1000;
setInterval(()=>{
  if(document.hidden) return;            // don't poll a backgrounded tab
  if(!selected) loadAllFires(true);      // avoid redrawing under an open forecast
  if(map.getZoom() >= PERIM_ZOOM){
    refreshPerimeters(); refreshHotspots();   // crisp viewport data when zoomed in
  } else {
    loadAllPerimeters();                 // refresh the national base only when zoomed out
  }                                       // (calling it while zoomed in would clobber the crisp perimeters)
}, REFRESH_MS);
map.on("click", "fires-dot", (e)=>{ const id=e.features[0].properties.id;
  const f = fires.find(x=>String(x.id)===String(id)); if(f) openSheet(f); });
map.on("mouseenter","fires-dot",()=> map.getCanvas().style.cursor="pointer");
map.on("mouseleave","fires-dot",()=> map.getCanvas().style.cursor="");

// Tap a satellite hotspot to read its burning intensity (FRP) and how that
// ranks — so you can see which part of the fire is most intense, not just where.
const hotspotPopup = new maplibregl.Popup({ closeButton:true, closeOnClick:true, offset:8 });
function frpLabel(mw){
  if(mw >= 200) return "extreme";
  if(mw >= 75)  return "very high";
  if(mw >= 20)  return "high";
  if(mw > 0)    return "moderate";
  return "low";
}
map.on("click","hotspots-dot",(e)=>{
  const p = e.features[0].properties || {};
  const frp = Number(p.frp);
  const bright = Number(p.bright_ti4);
  const when = [p.acq_date, p.acq_time && String(p.acq_time).padStart(4,"0")]
    .filter(Boolean).join(" ");
  const rows = [];
  if(Number.isFinite(frp)) rows.push(`<b>Intensity (FRP):</b> ${frp.toFixed(1)} MW — ${frpLabel(frp)}`);
  if(Number.isFinite(bright)) rows.push(`<b>Brightness:</b> ${bright.toFixed(0)} K`);
  if(p.confidence) rows.push(`<b>Confidence:</b> ${p.confidence}`);
  if(when) rows.push(`<b>Detected:</b> ${when} UTC`);
  hotspotPopup.setLngLat(e.lngLat)
    .setHTML(`<div style="font:12px/1.4 system-ui,sans-serif;color:#222">${rows.join("<br>")}</div>`)
    .addTo(map);
});
map.on("mouseenter","hotspots-dot",()=> map.getCanvas().style.cursor="pointer");
map.on("mouseleave","hotspots-dot",()=> map.getCanvas().style.cursor="");

// Click empty map (not on a fire, hotspot, or safe place) to dismiss: first close
// any open panel, then clear a pinned searched location — so you can tap out of it.
map.on("click",(e)=>{
  const layers = ["fires-dot","hotspots-dot","evac-dest"].filter(id=>map.getLayer(id));
  if(layers.length && map.queryRenderedFeatures(e.point,{layers}).length) return;
  if(sheet.classList.contains("show")){ closeSheet(); return; }
  if(evacSheet.classList.contains("show")){ closeEvacSheet(); return; }
  if(originMode==="search"){ hideMe(); origin=null; originMode=null; updateEvacFab(); }
});

// --- Live location tracking --------------------------------------------------
// A blue "you" dot that follows you as you move. While an evacuation is shown,
// moving far enough silently re-plans the routes from your new position.
// Your location is shown as a location-pin symbol (a marker), so it reads as
// "this place" rather than a generic dot. A DOM marker also always stays on top.
let meMarker = null;
function showMe(lat, lon){
  if(meMarker){ meMarker.setLngLat([lon,lat]); return; }
  meMarker = new maplibregl.Marker({ color:"#1a73e8" }).setLngLat([lon,lat]).addTo(map);
}
function hideMe(){ if(meMarker){ meMarker.remove(); meMarker = null; } }
function maybeReroute(lat, lon){
  // Only when evac routes are on screen and we've moved a meaningful distance.
  if(!routeOrigin || !map.getLayer("evac-line")) return;
  if(haversineKm(lat, lon, routeOrigin.lat, routeOrigin.lon) > 0.4) planEvacuation({ auto:true });
}

const locateBtn = document.getElementById("locate");
function stopTracking(){
  if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
  if(originMode==="gps"){ originMode=null; hideMe(); }
  locateBtn.style.color=""; locateBtn.textContent="◎";
  toast("Location tracking off.");
}
function startTracking(){
  if(!navigator.geolocation){ toast("Geolocation unavailable — type an address."); return; }
  toast("Tracking your location…", 0);
  originMode = "gps";        // tapping ◎ chooses live GPS as the origin
  let first = true;
  watchId = navigator.geolocation.watchPosition(
    p=>{ if(originMode!=="gps") return;     // a typed address takes precedence over live GPS
         const lat=p.coords.latitude, lon=p.coords.longitude;
         origin = { lat, lon }; showMe(lat, lon);
         if(first){ first=false; frameNearbyFires(lat, lon); }   // recenter once, then just follow
         else maybeReroute(lat, lon);
       },
    ()=>{ toast("Location blocked (needs https on a phone) — type an address instead."); stopTracking(); },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
  locateBtn.style.color="#1a73e8"; locateBtn.textContent="◉";
}
// Tap ◎ to start following your location; tap again to stop.
locateBtn.onclick = ()=>{ if(watchId==null) startTracking(); else stopTracking(); };
</script>
</body>
